<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
      rel="stylesheet">

<style>

  /*
     Layout 기준
     - 뉴스 날짜/제목/간격: 사용자가 업로드한 원본 index(2).html 값 유지
     - 뉴스 본문 최대 폭: 1280px, 가운데 정렬
     - 배너: 화면 전체 폭, 데스크톱 높이 280px
     - body의 기존 10px padding 유지
  */

  /* =====================================================
     전체 페이지
  ===================================================== */

  body {
    font-family: 'Lato', sans-serif;
    margin: 0;
    padding: 10px;
    background-color: transparent;
    color: #1d2042;
  }


  /* =====================================================
     뉴스 목록
  ===================================================== */

  .news-item {
    margin-bottom: 50pt;
  }


  .news-date {
    font-size: 11pt;
    margin-bottom: 8pt;
    color: #333;
  }


  .news-title {
    font-size: 18pt;
    line-height: 1.4;
  }


  .news-title a {
    color: #1d2042;
    text-decoration: none;
    cursor: pointer;
  }


  .news-title a:hover {
    text-decoration: underline;
  }


  /* =====================================================
     뉴스 배너
  ===================================================== */

  .news-banner {
    position: relative;

    /*
       body의 기존 10px padding은 뉴스 목록에 그대로 적용하고,
       배너만 화면 좌우 끝까지 확장합니다.
    */
    width: calc(100% + 20px);
    height: 450px;

    margin-top: -10px;
    margin-right: -10px;
    margin-bottom: 55px;
    margin-left: -10px;

    overflow: hidden;
    background: #000;
  }


  /*
     Google Sites 본문과 같은 폭 안에서 뉴스 목록을 중앙 정렬합니다.
     뉴스 항목 자체의 크기와 간격은 업로드한 원본 값을 변경하지 않습니다.
  */
  .news-content {
    width: 100%;
    max-width: 1280px;
    margin-right: auto;
    margin-left: auto;
  }


  /* 배너 사진을 살짝 어둡게 하여 중앙 제목이 잘 보이게 함 */
  .news-banner::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1;
    pointer-events: none;
  }


  .news-banner img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 10%;
  }


  /* Google Sites 원본처럼 배너 중앙에 표시되는 페이지 제목 */
  .news-banner-title {
    position: absolute;
    inset: 0;
    z-index: 2;

    display: flex;
    align-items: center;
    justify-content: center;

    margin: 0;
    padding: 20px;

    color: #fff;
    font-family: 'Lato', sans-serif;
    font-size: 65pt;
    font-weight: 700;
    line-height: 1.2;
    text-align: center;

    text-shadow:
      0 2px 8px rgba(0, 0, 0, 0.75);
  }


  /* =====================================================
     Pagination
  ===================================================== */

  .pagination {
    display: flex;
    gap: 8px;
    margin-top: 30px;
    margin-bottom: 30px;
  }


  .page-btn {
    font-family: 'Lato', sans-serif;

    padding: 6px 12px;

    border: 1px solid #ccc;
    background: #fff;

    cursor: pointer;

    border-radius: 4px;

    font-size: 14px;

    color: #1d2042;

    text-decoration: none;
  }


  .page-btn.active {
    font-weight: bold;
    background: #e0e0e0;
  }


  .page-btn:hover:not(.active) {
    background: #f0f0f0;
  }


  /* =====================================================
     상세 기사 페이지
  ===================================================== */

  .article-view {
    max-width: 1000px;
    margin: 0 auto;
    padding-bottom: 60px;
  }


  /* 뒤로가기 */

  .back-link {
    display: inline-block;

    margin-top: 10px;
    margin-bottom: 40px;

    color: #1d2042;

    text-decoration: none;

    font-size: 12pt;
    font-weight: 700;

    cursor: pointer;
  }


  .back-link:hover {
    text-decoration: underline;
  }


  /* 상세기사 날짜 */

  .article-date {
    font-size: 11pt;
    color: #555;

    margin-bottom: 12px;
  }


  /* 상세기사 제목 */

  .article-title {
    font-size: 30pt;
    line-height: 1.3;

    color: #1d2042;

    margin-top: 0;
    margin-bottom: 35px;
  }


  /* 상세기사 본문 */

  .article-content {
    font-size: 13pt;
    line-height: 1.8;

    color: #222;
  }


  .article-content p {
    margin-top: 0;
    margin-bottom: 22px;
  }


  /* 상세기사 이미지 갤러리 */

  .article-gallery {
    display: grid;
    grid-template-columns:
      repeat(auto-fit, minmax(280px, 1fr));

    gap: 28px;

    margin-top: 0;
    margin-bottom: 38px;
  }

  .article-gallery.vertical {
    grid-template-columns: 1fr;
  }

  /* 첫 번째 사진은 왼쪽 전체,
   두 번째와 세 번째 사진은 오른쪽 위아래 */
  .article-gallery.left-large {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: repeat(2, 280px);
    gap: 20px;
  }

  /* 사진 1 */
  .article-gallery.left-large .article-figure:nth-child(1) {
    grid-column: 1;
    grid-row: 1 / span 2;
  }

  /* 사진 2 */
  .article-gallery.left-large .article-figure:nth-child(2) {
    grid-column: 2;
    grid-row: 1;
  }

  /* 사진 3 */
  .article-gallery.left-large .article-figure:nth-child(3) {
    grid-column: 2;
    grid-row: 2;
  }

  .article-gallery.left-large .article-figure {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .article-gallery.left-large .article-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .article-figure {
    margin: 0;
  }


  .article-image {
    display: block;

    width: 100%;
    max-width: 100%;
    height: auto;
    margin: 0 auto;
  }


  /* 이미지 설명 */

  .image-caption {
    margin-top: 10px;
    margin-bottom: 0;

    font-size: 10.5pt;
    line-height: 1.5;

    text-align: center;

    color: #666;
  }


  /* 구분선 */

  .article-divider {
    border: none;
    border-top: 1px solid #ddd;

    margin-top: 40px;
    margin-bottom: 40px;
  }

  /* 상세기사 2컬럼 레이아웃 */
  .article-two-column {
    display: grid;
    grid-template-columns: minmax(0, 2.5fr) minmax(220px, 1.5fr);
    gap: 60px;

    align-items: start;
  }


  /* 각 컬럼 제목 */
  .article-column-title {
    margin-top: 0;
    margin-bottom: 14px;

    font-size: 15pt;
    font-weight: 400;
    line-height: 1.5;
  }


  /* 2컬럼 내부 목록 */
  .article-two-column ul {
    margin-top: 0;
    margin-bottom: 0;
    padding-left: 20px;
  }


  .article-two-column li {
    margin-bottom: 10px;
  }


  /* 오른쪽 문의사항 영역 */
  .article-contact {
    font-size: 12pt;
    line-height: 1.7;
  }


  .article-contact a {
    color: #1d2042;
    text-decoration: underline;
  }


  /* 모바일에서는 세로 배치 */
  @media (max-width: 700px) {

    .article-two-column {
      grid-template-columns: 1fr;
      gap: 35px;
    }

    .article-gallery.left-large {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
    }

    .article-gallery.left-large .article-figure:nth-child(1),
    .article-gallery.left-large .article-figure:nth-child(2),
    .article-gallery.left-large .article-figure:nth-child(3) {
      grid-column: auto;
      grid-row: auto;
      height: auto;
    }

    .article-gallery.left-large .article-image {
      height: auto;
      object-fit: contain;
    }

  }

  /* =====================================================
     모바일 대응
  ===================================================== */

  @media (max-width: 700px) {

    .news-banner {
      height: 210px;
      margin-bottom: 40px;
    }


    .news-banner-title {
      font-size: 30pt;
    }


    .news-title {
      font-size: 16pt;
    }


    .article-title {
      font-size: 24pt;
    }


    .article-content {
      font-size: 12pt;
    }

  }

</style>

</head>

/* =====================================================
   설정
===================================================== */


const itemsPerPage = 10;

let savedListPage = 1;
let savedListScrollY = 0;
let shouldRestoreListScroll = false;


/*
   크롬 뒤로가기 시 브라우저의 자동 스크롤 복원과
   코드의 수동 복원이 충돌하지 않도록 설정
*/
if ("scrollRestoration" in history) {
  history.scrollRestoration = "manual";
}


/* =====================================================
   HTML 특수문자 처리

   중요:
   "<우주기술과 응용>" 같은 제목을 innerHTML에 바로
   넣으면 HTML 태그로 오해될 수 있기 때문에 필요함.
===================================================== */


function escapeHTML(text) {

  return String(text)

    .replaceAll("&", "&amp;")

    .replaceAll("<", "&lt;")

    .replaceAll(">", "&gt;")

    .replaceAll('"', "&quot;")

    .replaceAll("'", "&#039;");

}



/* =====================================================
   상세 기사 이미지 렌더링
===================================================== */


function renderArticleImages(item) {

  if (
    !Array.isArray(item.images) ||
    item.images.length === 0
  ) {

    return "";

  }


  const figures =
    item.images
      .map(image => {

        const imageURL =
          IMAGE_BASE_URL +
          encodeURI(image.file);


        return `

          <figure class="article-figure">

            <img
              class="article-image"
              src="${imageURL}"
              alt="${escapeHTML(
                image.caption || item.title
              )}"
              loading="lazy"
              style="width: ${image.width || "100%"};"
            >

            ${
              image.caption
                ? `
                  <figcaption class="image-caption">

                    ${escapeHTML(image.caption)}

                  </figcaption>
                `
                : ""
            }

          </figure>

        `;

      })
      .join("");


  const layoutClass =
    item.imageLayout === "left-large"
      ? "left-large"
      : item.imageLayout === "vertical"
        ? "vertical"
        : "";
  
  return `
    <div class="article-gallery ${layoutClass}">
      ${figures}
    </div>
  `;

}



/* =====================================================
   뉴스 목록 렌더링
===================================================== */


function renderNews(page) {


  const totalPages =
    Math.ceil(newsData.length / itemsPerPage);


  /* 페이지 범위 보정 */

  page = Math.max(
    1,
    Math.min(page, totalPages)
  );


  const start =
    (page - 1) * itemsPerPage;


  const end =
    start + itemsPerPage;


  const currentItems =
    newsData.slice(start, end);


  const app =
    document.getElementById("app");


  app.innerHTML = `

    <div class="news-banner">

      <img
        src="${IMAGE_BASE_URL}${BANNER_IMAGE}"
        alt="달 표면의 우주비행사"
      >

      <h1 class="news-banner-title">
        News
      </h1>

    </div>

    <div class="news-content">

      <div id="news-list"></div>

      <div
        class="pagination"
        id="pagination">
      </div>

    </div>

  `;


  const newsContainer =
    document.getElementById("news-list");


  currentItems.forEach(item => {


    const div =
      document.createElement("div");


    div.className =
      "news-item";


    div.innerHTML = `

      <div class="news-date">

        ${escapeHTML(item.date)}

      </div>


      <div class="news-title">

        <a
          href="#article/${encodeURIComponent(item.id)}/${page}">

          ${escapeHTML(item.title)}

        </a>

      </div>

    `;

    
    const articleLink = 
      div.querySelector(".news-title a")

    articleLink.addEventListener(
      "click",
      () => {
        savedListPage = page;
        savedListScrollY = window.scrollY;
        shouldRestoreListScroll = true;
      }
    );

    newsContainer.appendChild(div);

  });


  renderPagination(page);


  /*
     크롬 뒤로가기로 기사에서 뉴스 목록으로 돌아온 경우,
     기사를 열기 직전의 스크롤 위치를 복원
  */
  if (
    shouldRestoreListScroll &&
    page === savedListPage
  ) {

    const restoreY =
      savedListScrollY;


    shouldRestoreListScroll =
      false;


    /*
       뉴스 목록이 화면에 완전히 배치된 다음 복원
    */
    requestAnimationFrame(() => {

      requestAnimationFrame(() => {

        window.scrollTo({
          top: restoreY,
          behavior: "auto"
        });

      });

    });

  } else {

    window.scrollTo({
      top: 0,
      behavior: "smooth"
    });

  }

}



/* =====================================================
   페이지 번호 렌더링
===================================================== */


function renderPagination(currentPage) {


  const totalPages =
    Math.ceil(newsData.length / itemsPerPage);


  const container =
    document.getElementById("pagination");


  container.innerHTML = "";


  for (
    let i = 1;
    i <= totalPages;
    i++
  ) {


    const link =
      document.createElement("a");


    link.className =
      "page-btn" +
      (i === currentPage ? " active" : "");


    link.textContent =
      i;


    link.href =
      `#list/${i}`;


    container.appendChild(link);

  }

}



/* =====================================================
   상세 기사 렌더링
===================================================== */
function returnToNews(page) {
  shouldRestoreListScroll = true;

  window.location.hash =
    `list/${page}`;
}

function renderArticle(articleId, previousPage) {


  const item =
    newsData.find(
      news => news.id === articleId
    );


  if (!item) {

    renderNotFound();

    return;

  }


  const app =
    document.getElementById("app");


  /*
     content가 없는 뉴스의 경우
     제목을 바탕으로 기본 문장 표시
  */


  const articleContent =
    item.content || `

      <p>
        ${escapeHTML(item.title)} 관련 소식입니다.
      </p>

    `;


  app.innerHTML = `

    <article class="article-view">


      <a
        class="back-link"
        href="#list/${previousPage}"
        onclick="
          returnToNews(${previousPage});
          return false;
          ">

        ← Back to News

      </a>


      <div class="article-date">

        ${escapeHTML(item.date)}

      </div>


      <h1 class="article-title">

        ${escapeHTML(item.title)}

      </h1>


      <div class="article-content">

        ${renderArticleImages(item)}

        ${articleContent}

      </div>


      <hr class="article-divider">


      <a
        class="back-link"
        href="#list/${previousPage}"
        onclick="
          returnToNews(${previousPage});
          return false;
          ">

        ← Back to News

      </a>


    </article>

  `;


  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });

}



/* =====================================================
   없는 기사
===================================================== */


function renderNotFound() {


  const app =
    document.getElementById("app");


  app.innerHTML = `

    <article class="article-view">

      <a
        class="back-link"
        href="#list/1">

        ← Back to News

      </a>

      <h1 class="article-title">
        Article Not Found
      </h1>

      <div class="article-content">

        <p>
          해당 기사를 찾을 수 없습니다.
        </p>

      </div>

    </article>

  `;

}



/* =====================================================
   Router

   가능한 주소:

   #list/1

   #list/2

   #article/space-conference-2026/1

===================================================== */


function handleRoute() {


  const hash =
    window.location.hash;


  /* 첫 실행 */

  if (!hash) {


    history.replaceState(
      null,
      "",
      "#list/1"
    );


    renderNews(1);


    return;

  }


  const route =
    hash.substring(1).split("/");


  /* ---------------------------------------------
     목록
  --------------------------------------------- */


  if (route[0] === "list") {


    const page =
      parseInt(route[1], 10) || 1;


    renderNews(page);


    return;

  }


  /* ---------------------------------------------
     상세 기사
  --------------------------------------------- */


  if (route[0] === "article") {


    const articleId =
      decodeURIComponent(route[1] || "");


    const previousPage =
      parseInt(route[2], 10) || 1;


    renderArticle(
      articleId,
      previousPage
    );


    return;

  }


  /* 알 수 없는 주소 */

  renderNews(1);

}



/* =====================================================
   주소 변경 감지
===================================================== */


window.addEventListener(
  "hashchange",
  handleRoute
);



/* =====================================================
   최초 실행
===================================================== */


handleRoute();


</script>
