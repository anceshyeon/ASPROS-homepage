<style>

  /* =====================================================
     전체 페이지
  ===================================================== */

  body {
    font-family: 'Lato', sans-serif;
    margin: 0;
    padding: 10px;
    background-color: transparent;
    color: #1d2042;
  }


  /* =====================================================
     뉴스 목록
  ===================================================== */

  .news-item {
    margin-bottom: 50pt;
  }


  .news-date {
    font-size: 11pt;
    margin-bottom: 8pt;
    color: #333;
  }


  .news-title {
    font-size: 18pt;
    line-height: 1.4;
  }


  .news-title a {
    color: #1d2042;
    text-decoration: none;
    cursor: pointer;
  }


  .news-title a:hover {
    text-decoration: underline;
  }


  /* =====================================================
     Pagination
  ===================================================== */

  .pagination {
    display: flex;
    gap: 8px;
    margin-top: 30px;
    margin-bottom: 30px;
  }


  .page-btn {
    font-family: 'Lato', sans-serif;

    padding: 6px 12px;

    border: 1px solid #ccc;
    background: #fff;

    cursor: pointer;

    border-radius: 4px;

    font-size: 14px;

    color: #1d2042;

    text-decoration: none;
  }


  .page-btn.active {
    font-weight: bold;
    background: #e0e0e0;
  }


  .page-btn:hover:not(.active) {
    background: #f0f0f0;
  }


  /* =====================================================
     상세 기사 페이지
  ===================================================== */

  .article-view {
    max-width: 1000px;
    margin: 0 auto;
    padding-bottom: 60px;
  }


  /* 뒤로가기 */

  .back-link {
    display: inline-block;

    margin-top: 10px;
    margin-bottom: 40px;

    color: #1d2042;

    text-decoration: none;

    font-size: 12pt;
    font-weight: 700;

    cursor: pointer;
  }


  .back-link:hover {
    text-decoration: underline;
  }


  /* 상세기사 날짜 */

  .article-date {
    font-size: 11pt;
    color: #555;

    margin-bottom: 12px;
  }


  /* 상세기사 제목 */

  .article-title {
    font-size: 30pt;
    line-height: 1.3;

    color: #1d2042;

    margin-top: 0;
    margin-bottom: 35px;
  }


  /* 상세기사 본문 */

  .article-content {
    font-size: 13pt;
    line-height: 1.8;

    color: #222;
  }


  .article-content p {
    margin-top: 0;
    margin-bottom: 22px;
  }


  /* 상세기사 이미지 */

  .article-image {
    display: block;

    width: 100%;
    max-width: 900px;

    height: auto;

    margin: 30px auto;
  }


  /* 이미지 설명 */

  .image-caption {
    margin-top: -20px;
    margin-bottom: 30px;

    font-size: 10.5pt;

    text-align: center;

    color: #666;
  }


  /* 구분선 */

  .article-divider {
    border: none;
    border-top: 1px solid #ddd;

    margin-top: 40px;
    margin-bottom: 40px;
  }


  /* =====================================================
     모바일 대응
  ===================================================== */

  @media (max-width: 700px) {

    .news-title {
      font-size: 16pt;
    }


    .article-title {
      font-size: 24pt;
    }


    .article-content {
      font-size: 12pt;
    }

  }

</style>

/* =====================================================
   설정
===================================================== */


const itemsPerPage = 10;


/* =====================================================
   HTML 특수문자 처리

   중요:
   "<우주기술과 응용>" 같은 제목을 innerHTML에 바로
   넣으면 HTML 태그로 오해될 수 있기 때문에 필요함.
===================================================== */


function escapeHTML(text) {

  return String(text)

    .replaceAll("&", "&amp;")

    .replaceAll("<", "&lt;")

    .replaceAll(">", "&gt;")

    .replaceAll('"', "&quot;")

    .replaceAll("'", "&#039;");

}



/* =====================================================
   뉴스 목록 렌더링
===================================================== */


function renderNews(page) {


  const totalPages =
    Math.ceil(newsData.length / itemsPerPage);


  /* 페이지 범위 보정 */

  page = Math.max(
    1,
    Math.min(page, totalPages)
  );


  const start =
    (page - 1) * itemsPerPage;


  const end =
    start + itemsPerPage;


  const currentItems =
    newsData.slice(start, end);


  const app =
    document.getElementById("app");


  app.innerHTML = `

    <div id="news-list"></div>

    <div
      class="pagination"
      id="pagination">
    </div>

  `;


  const newsContainer =
    document.getElementById("news-list");


  currentItems.forEach(item => {


    const div =
      document.createElement("div");


    div.className =
      "news-item";


    div.innerHTML = `

      <div class="news-date">

        ${escapeHTML(item.date)}

      </div>


      <div class="news-title">

        <a
          href="#article/${encodeURIComponent(item.id)}/${page}">

          ${escapeHTML(item.title)}

        </a>

      </div>

    `;


    newsContainer.appendChild(div);

  });


  renderPagination(page);


  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });

}



/* =====================================================
   페이지 번호 렌더링
===================================================== */


function renderPagination(currentPage) {


  const totalPages =
    Math.ceil(newsData.length / itemsPerPage);


  const container =
    document.getElementById("pagination");


  container.innerHTML = "";


  for (
    let i = 1;
    i <= totalPages;
    i++
  ) {


    const link =
      document.createElement("a");


    link.className =
      "page-btn" +
      (i === currentPage ? " active" : "");


    link.textContent =
      i;


    link.href =
      `#list/${i}`;


    container.appendChild(link);

  }

}



/* =====================================================
   상세 기사 렌더링
===================================================== */


function renderArticle(articleId, previousPage) {


  const item =
    newsData.find(
      news => news.id === articleId
    );


  if (!item) {

    renderNotFound();

    return;

  }


  const app =
    document.getElementById("app");


  /*
     content가 없는 뉴스의 경우
     기본 테스트 문장 표시
  */


  const articleContent =
    item.content || `

      <p>
        <strong>상세 페이지 전환 테스트에 성공했습니다.</strong>
      </p>

      <p>
        현재 이 뉴스에는 아직 HTML 본문이 입력되어 있지 않습니다.
      </p>

      <p>
        newsData의 해당 항목에
        <code>content</code>를 추가하면
        이 영역에 기사 본문을 표시할 수 있습니다.
      </p>

    `;


  app.innerHTML = `

    <article class="article-view">


      <a
        class="back-link"
        href="#list/${previousPage}">

        ← Back to News

      </a>


      <div class="article-date">

        ${escapeHTML(item.date)}

      </div>


      <h1 class="article-title">

        ${escapeHTML(item.title)}

      </h1>


      <div class="article-content">

        ${articleContent}

      </div>


      <hr class="article-divider">


      <a
        class="back-link"
        href="#list/${previousPage}">

        ← Back to News

      </a>


    </article>

  `;


  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });

}



/* =====================================================
   없는 기사
===================================================== */


function renderNotFound() {


  const app =
    document.getElementById("app");


  app.innerHTML = `

    <article class="article-view">

      <a
        class="back-link"
        href="#list/1">

        ← Back to News

      </a>

      <h1 class="article-title">
        Article Not Found
      </h1>

      <div class="article-content">

        <p>
          해당 기사를 찾을 수 없습니다.
        </p>

      </div>

    </article>

  `;

}



/* =====================================================
   Router

   가능한 주소:

   #list/1

   #list/2

   #article/space-conference-2026/1

===================================================== */


function handleRoute() {


  const hash =
    window.location.hash;


  /* 첫 실행 */

  if (!hash) {


    history.replaceState(
      null,
      "",
      "#list/1"
    );


    renderNews(1);


    return;

  }


  const route =
    hash.substring(1).split("/");


  /* ---------------------------------------------
     목록
  --------------------------------------------- */


  if (route[0] === "list") {


    const page =
      parseInt(route[1], 10) || 1;


    renderNews(page);


    return;

  }


  /* ---------------------------------------------
     상세 기사
  --------------------------------------------- */


  if (route[0] === "article") {


    const articleId =
      decodeURIComponent(route[1] || "");


    const previousPage =
      parseInt(route[2], 10) || 1;


    renderArticle(
      articleId,
      previousPage
    );


    return;

  }


  /* 알 수 없는 주소 */

  renderNews(1);

}



/* =====================================================
   주소 변경 감지
===================================================== */


window.addEventListener(
  "hashchange",
  handleRoute
);



/* =====================================================
   최초 실행
===================================================== */


handleRoute();


</script>
